<svg viewBox="0 0 720 540" class="block h-auto w-full" role="img" aria-labelledby="illoTitle illoDesc" xmlns="http://www.w3.org/2000/svg">
            <title id="illoTitle">Coming soon, under construction</title>
            <desc id="illoDesc">A wooden privacy fence in a sunny grassy backyard, with one panel still being built, plus a striped construction barricade, a warning beacon, a traffic cone, and a small stack of lumber.</desc>

            <defs>
              <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#BFE2F7" />
                <stop offset="1" stop-color="#E8F5FC" />
              </linearGradient>
              <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#8AC54B" />
                <stop offset="1" stop-color="#6BA833" />
              </linearGradient>
              <radialGradient id="sun" cx="50%" cy="50%" r="50%">
                <stop offset="0" stop-color="#FFF6D6" />
                <stop offset="1" stop-color="#FFE48C" />
              </radialGradient>
              <radialGradient id="beacon" cx="50%" cy="50%" r="50%">
                <stop offset="0" stop-color="#FFE39A" />
                <stop offset="100%" stop-color="#FF9A1F" />
              </radialGradient>
              <pattern id="wood" width="26" height="120" patternUnits="userSpaceOnUse" patternTransform="translate(0 300)">
                <rect width="26" height="120" fill="#C2854A" />
                <rect width="22" height="120" fill="#CD8F50" />
                <rect width="22" height="6" fill="#DEA56C" />
                <rect x="22" width="4" height="120" fill="#9C6531" />
                <rect x="6" y="18" width="2" height="86" fill="#BC8044" opacity="0.55" />
                <rect x="14" y="30" width="2" height="70" fill="#BC8044" opacity="0.4" />
              </pattern>
              <pattern id="hazard" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <rect width="30" height="30" fill="#F2F3F5" />
                <rect width="15" height="30" fill="#FF6A00" />
              </pattern>
              <filter id="soft" x="-40%" y="-60%" width="180%" height="240%">
                <feGaussianBlur stdDeviation="6" />
              </filter>
            </defs>

            <!-- Sky -->
            <rect x="0" y="0" width="720" height="400" fill="url(#sky)" />
            <circle cx="606" cy="96" r="74" fill="url(#sun)" opacity="0.55" />
            <circle cx="606" cy="96" r="42" fill="#FFEFB0" />

            <!-- Clouds -->
            <g class="clouds" fill="#FFFFFF">
              <g opacity="0.95">
                <ellipse cx="158" cy="104" rx="46" ry="24" />
                <ellipse cx="198" cy="92" rx="36" ry="26" />
                <ellipse cx="118" cy="98" rx="28" ry="19" />
                <rect x="112" y="104" width="92" height="20" />
              </g>
              <g opacity="0.9">
                <ellipse cx="430" cy="70" rx="34" ry="18" />
                <ellipse cx="460" cy="62" rx="26" ry="18" />
                <rect x="398" y="70" width="92" height="14" />
              </g>
            </g>

            <!-- Birds -->
            <g stroke="#7E8B95" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7">
              <path d="M286 120 q7 -8 14 0 q7 -8 14 0" />
              <path d="M330 134 q5 -6 10 0 q5 -6 10 0" />
            </g>

            <!-- Grass -->
            <path d="M0 392 C 180 372 540 372 720 392 L720 540 L0 540 Z" fill="url(#grass)" />
            <path d="M0 452 C 220 430 520 432 720 452 L720 540 L0 540 Z" fill="#93CC56" opacity="0.55" />

            <!-- Ground shadows (green-tinted, soft) -->
            <ellipse cx="548" cy="506" rx="118" ry="13" fill="#3E6B1E" opacity="0.22" filter="url(#soft)" />
            <ellipse cx="130" cy="504" rx="42" ry="9" fill="#3E6B1E" opacity="0.22" filter="url(#soft)" />
            <ellipse cx="300" cy="508" rx="86" ry="10" fill="#3E6B1E" opacity="0.2" filter="url(#soft)" />

            <!-- ===== WOODEN PRIVACY FENCE (one panel under construction) ===== -->
            <!-- posts -->
            <g>
              <rect x="46" y="286" width="18" height="124" fill="#A66A30" /><rect x="46" y="286" width="5" height="124" fill="#BE7E40" /><path d="M44 286 L55 274 L66 286 Z" fill="#8A571F" />
              <rect x="316" y="286" width="18" height="124" fill="#A66A30" /><rect x="316" y="286" width="5" height="124" fill="#BE7E40" /><path d="M314 286 L325 274 L336 286 Z" fill="#8A571F" />
              <rect x="430" y="286" width="18" height="124" fill="#A66A30" /><rect x="430" y="286" width="5" height="124" fill="#BE7E40" /><path d="M428 286 L439 274 L450 286 Z" fill="#8A571F" />
              <rect x="650" y="286" width="18" height="124" fill="#A66A30" /><rect x="650" y="286" width="5" height="124" fill="#BE7E40" /><path d="M648 286 L659 274 L670 286 Z" fill="#8A571F" />
            </g>
            <!-- built panels (planks) -->
            <rect x="64" y="300" width="252" height="106" fill="url(#wood)" />
            <rect x="448" y="300" width="202" height="106" fill="url(#wood)" />
            <!-- top + bottom rail boards over the built panels -->
            <rect x="56" y="296" width="268" height="9" rx="2" fill="#B5783C" />
            <rect x="440" y="296" width="218" height="9" rx="2" fill="#B5783C" />
            <!-- the GAP panel: rails up, planks not yet installed -->
            <rect x="334" y="316" width="96" height="9" rx="2" fill="#8A571F" />
            <rect x="334" y="378" width="96" height="9" rx="2" fill="#8A571F" />
            <!-- two planks leaning, ready to install -->
            <g>
              <rect x="356" y="330" width="20" height="118" rx="2" fill="url(#wood)" transform="rotate(12 366 389)" />
              <rect x="378" y="330" width="20" height="118" rx="2" fill="url(#wood)" transform="rotate(16 388 389)" />
            </g>

            <!-- lumber stack on the grass -->
            <g>
              <rect x="236" y="486" width="132" height="11" rx="2" fill="#CD8F50" /><rect x="236" y="486" width="132" height="3" fill="#DEA56C" />
              <rect x="244" y="474" width="132" height="11" rx="2" fill="#C2854A" /><rect x="244" y="474" width="132" height="3" fill="#DEA56C" />
              <rect x="232" y="498" width="132" height="11" rx="2" fill="#B97E45" /><rect x="232" y="498" width="132" height="3" fill="#D49A60" />
              <circle cx="368" cy="491" r="2" fill="#8A571F" /><circle cx="376" cy="479" r="2" fill="#8A571F" />
            </g>

            <!-- traffic cone -->
            <g>
              <rect x="104" y="496" width="56" height="13" rx="4" fill="#C44A00" />
              <path d="M118 496 L130 432 L134 432 L146 496 Z" fill="#FF6A00" />
              <path d="M118 496 L130 432 L132 432 L124 496 Z" fill="#FF8A3D" />
              <path d="M122 470 L142 470 L145 482 L119 482 Z" fill="#F4F5F6" />
              <path d="M126 450 L138 450 L140 459 L124 459 Z" fill="#F4F5F6" />
            </g>

            <!-- construction barricade -->
            <g>
              <path d="M462 462 L448 510 L460 510 L472 464 Z" fill="#5C636B" />
              <path d="M478 462 L492 510 L504 510 L488 464 Z" fill="#4A5158" />
              <path d="M604 462 L590 510 L602 510 L614 464 Z" fill="#5C636B" />
              <path d="M620 462 L634 510 L646 510 L630 464 Z" fill="#4A5158" />
              <rect x="446" y="430" width="200" height="32" rx="3" fill="url(#hazard)" />
              <rect x="446" y="430" width="200" height="32" rx="3" fill="none" stroke="#B34A00" stroke-width="3" />
              <rect x="458" y="472" width="176" height="12" rx="2" fill="#4A5158" />
              <rect x="536" y="410" width="20" height="12" rx="2" fill="#2C3036" />
              <circle cx="546" cy="404" r="20" fill="#FF9A1F" class="beacon-glow" />
              <circle cx="546" cy="404" r="10" fill="url(#beacon)" />
              <circle cx="542" cy="400" r="3" fill="#FFF1CC" />
            </g>
          </svg>